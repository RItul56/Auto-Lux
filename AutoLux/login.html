<!DOCTYPE html>
<html lang="en">
<head>
  <title>AutoLux Motors - Login / Signup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body { background: #f4f4f4; color: #333; }

    /* Header */
    header {
      background: #232f3e;
      color: #fff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 22px; }
    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover { text-decoration: underline; }

    /* Container */
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .form-box h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: #232f3e;
      text-align: center;
    }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #222;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #222; }
    .remember {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .remember input { width: auto; margin-right: 8px; }

    /* Footer */
    footer {
      margin-top: 40px;
      background: #232f3e;
      color: #fff;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>AutoLux Motors</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="payment.html">Payment</a>
      <a href="thankyou.html">Orders</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <!-- Container -->
  <div class="container">
    <!-- Login Form -->
    <div class="form-box">
      <h2>Login</h2>
      <form>
        <div class="form-group">
          <label for="login-email">Email / Phone</label>
          <input type="text" id="login-email" placeholder="Enter Email or Phone">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter Password">
        </div>
        <div class="remember">
          <input type="checkbox" id="remember">
          <label for="remember">Remember Me</label>
        </div>
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Signup Form -->
    <div class="form-box">
      <h2>Signup</h2>
      <form>
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="Enter Full Name">
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="Enter Email">
        </div>
        <div class="form-group">
          <label for="signup-phone">Phone</label>
          <input type="text" id="signup-phone" placeholder="Enter Phone Number">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Enter Password">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Confirm Password">
        </div>
        <button type="submit">Signup</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 AutoLux Motors. All Rights Reserved.</p>
  </footer>
</body>
</html>
